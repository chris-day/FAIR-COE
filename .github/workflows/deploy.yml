name: build-and-deploy-docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MKDOCS_SITE_URL: https://your-org.github.io/your-public-repo/
  DOCS_BOOTSTRAP_MODE: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python scripts/check_workflow_actions.py
      - run: python scripts/check_site_url.py
      - env:
          DOCS_READ_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
          DOCS_BOOTSTRAP_MODE: true
        run: python scripts/checkout_repos.py
      - run: python scripts/check_promotion_policy.py
      - run: python scripts/sync_public_docs.py
      - run: python scripts/generate_site_config.py
      - run: python scripts/validate_contract.py
      - run: python scripts/check_redirects.py
      - run: python scripts/check_links.py
      - run: mkdocs build -f mkdocs.generated.yml --strict
      - run: python scripts/write_promotion_manifest.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
