name: policy-enforcement

on:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MKDOCS_SITE_URL: https://example.github.io/docs-hub/
  DOCS_BOOTSTRAP_MODE: true

jobs:
  workflow-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python scripts/check_workflow_actions.py

  promotion-policy:
    runs-on: ubuntu-latest
    needs: workflow-guardrails
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - env:
          DOCS_READ_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
          DOCS_BOOTSTRAP_MODE: true
        run: python scripts/checkout_repos.py
      - run: python scripts/check_promotion_policy.py

  site-url-policy:
    runs-on: ubuntu-latest
    needs: workflow-guardrails
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - run: python scripts/check_site_url.py

  contract-validation:
    runs-on: ubuntu-latest
    needs: [promotion-policy, site-url-policy]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - env:
          DOCS_READ_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
          DOCS_BOOTSTRAP_MODE: true
        run: python scripts/checkout_repos.py
      - run: python scripts/sync_public_docs.py
      - run: python scripts/generate_site_config.py
      - run: python scripts/validate_contract.py

  redirect-validation:
    runs-on: ubuntu-latest
    needs: contract-validation
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - env:
          DOCS_READ_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
          DOCS_BOOTSTRAP_MODE: true
        run: python scripts/checkout_repos.py
      - run: python scripts/sync_public_docs.py
      - run: python scripts/check_redirects.py

  link-and-anchor-validation:
    runs-on: ubuntu-latest
    needs: contract-validation
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - env:
          DOCS_READ_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
          DOCS_BOOTSTRAP_MODE: true
        run: python scripts/checkout_repos.py
      - run: python scripts/sync_public_docs.py
      - run: python scripts/check_links.py

  site-build:
    runs-on: ubuntu-latest
    needs: [redirect-validation, link-and-anchor-validation]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - env:
          DOCS_READ_TOKEN: ${{ secrets.DOCS_READ_TOKEN }}
          DOCS_BOOTSTRAP_MODE: true
        run: python scripts/checkout_repos.py
      - run: python scripts/sync_public_docs.py
      - run: python scripts/generate_site_config.py
      - run: mkdocs build -f mkdocs.generated.yml --strict
