repositories:
  - id: fair-maturity-matrix
    slug: fair-maturity-matrix
    repository: chris-day/FAIR-Maturity-Matrix
    local_example_path: examples/fair-maturity-matrix
    checkout_path: .cache/repos/fair-maturity-matrix
    remote_url_env: FAIR_MATURITY_MATRIX_URL
    required: true
  - id: repo-b
    slug: repo-b
    repository: your-org/private-repo-b
    local_example_path: examples/private-repo-b
    checkout_path: .cache/repos/repo-b
    remote_url_env: REPO_B_URL
    required: false
  - id: repo-c
    slug: repo-c
    repository: your-org/private-repo-c
    local_example_path: examples/private-repo-c
    checkout_path: .cache/repos/repo-c
    remote_url_env: REPO_C_URL
    required: false
